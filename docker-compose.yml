version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tutordesk
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build: ./backend
    depends_on: [db]
    ports:
      - "3001:3001"
    env_file: ./backend/.env
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
volumes:
  pgdata:
